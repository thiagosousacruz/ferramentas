<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Tetris Brink</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <section id="startScreen" class="screen start-screen is-active">
      <div class="start-card">
        <p class="screen-label">Brink style</p>
        <h1>Tetris Pocket</h1>
        <p class="start-copy">
          Interface pensada so para mobile, com cruz direcional a esquerda,
          botao rotate a direita e a proxima pedra sempre visivel.
        </p>
        <div class="start-preview" aria-hidden="true">
          <div class="preview-frame"></div>
          <div class="preview-buttons">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span class="preview-rotate"></span>
          </div>
        </div>
        <button id="startGameButton" class="primary-button" type="button">Jogar</button>
      </div>
    </section>

    <section id="gameScreen" class="screen game-screen" aria-label="Jogo Tetris estilo Brink Game">
      <div class="console-shell">
        <div class="console-topbar">
          <p class="brand">SUPER</p>
          <div class="status-strip">
            <div>
              <span class="status-label">Score</span>
              <strong id="score">0</strong>
            </div>
            <div>
              <span class="status-label">Level</span>
              <strong id="level">1</strong>
            </div>
            <div>
              <span class="status-label">Lines</span>
              <strong id="lines">0</strong>
            </div>
          </div>
        </div>

        <div class="console-screen-area">
          <div class="board-shell">
            <div class="board-frame">
              <canvas id="gameCanvas" width="300" height="600" aria-label="Tabuleiro do Tetris"></canvas>
              <div id="overlay" class="overlay visible">
                <p id="overlayTitle">Pronto</p>
                <p id="overlayText">Use os botoes abaixo para jogar.</p>
              </div>
            </div>
          </div>

          <aside class="next-panel">
            <span class="next-label">Next</span>
            <canvas id="nextCanvas" width="120" height="120" aria-label="Proxima peca"></canvas>
            <div class="mini-actions">
              <button id="pauseButton" class="mini-action" type="button">P</button>
              <button id="restartButton" class="mini-action" type="button">R</button>
            </div>
            <section class="high-scores-panel" aria-labelledby="highScoresTitle">
              <span id="highScoresTitle" class="next-label">Top 5</span>
              <ol id="highScoresList" class="high-scores-list"></ol>
            </section>
          </aside>
        </div>

        <div class="control-deck">
          <div class="dpad" aria-label="Direcional">
            <button class="control-button up" type="button" data-action="up" aria-label="Queda rapida">UP</button>
            <button class="control-button left" type="button" data-action="left" aria-label="Mover para a esquerda">LEFT</button>
            <button class="control-button right" type="button" data-action="right" aria-label="Mover para a direita">RIGHT</button>
            <button class="control-button down" type="button" data-action="down" aria-label="Descer">DOWN</button>
          </div>

          <div class="rotate-cluster">
            <button class="rotate-button" type="button" data-action="rotate" aria-label="Girar peca">Rotate</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
